<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger - Чат приложение</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Экран авторизации -->
    <div id="authScreen" class="auth-container">
        <div class="auth-box">
            <h2>Добро пожаловать в Messenger</h2>
            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Вход</button>
                <button class="tab-btn" onclick="switchTab('register')">Регистрация</button>
            </div>
            
            <!-- Форма входа -->
            <form id="loginForm" class="auth-form active">
                <div class="form-group">
                    <label for="loginLogin">Логин</label>
                    <input type="text" id="loginLogin" placeholder="Введите логин" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Пароль</label>
                    <input type="password" id="loginPassword" placeholder="Введите пароль" required>
                </div>
                <button type="submit" class="btn-primary">Войти</button>
            </form>
            
            <!-- Форма регистрации -->
<form id="registerForm" class="auth-form">
    <div class="form-group">
        <label>Логин</label>
        <input type="text" id="regLogin" name="login" placeholder="Логин">
    </div>
    <div class="form-group">
        <label>Пароль</label>
        <input type="password" id="regPassword" name="password" placeholder="Пароль">
    </div>
    <button type="submit">Зарегистрироваться</button>
</form>
            
            <div id="authError" class="error-message" style="display: none;"></div>
        </div>
    </div>

    <!-- Основное приложение чата -->
    <div id="chatApp" class="chat-container" style="display: none;">
        <!-- Боковая панель с комнатами -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>Комнаты</h3>
                <button id="createRoomBtn" class="btn-icon" title="Создать комнату">+</button>
            </div>
            <div id="roomsList" class="rooms-list">
                <!-- Комнаты будут загружены сюда -->
            </div>
            <div class="user-info">
                <div>
                    <span id="currentUserLogin"></span>
                    <div id="connectionStatus" style="font-size: 11px; margin-top: 4px;">● Онлайн</div>
                </div>
                <button id="logoutBtn" class="btn-logout">Выйти</button>
            </div>
        </div>

        <!-- Основная область чата -->
        <div class="chat-main">
            <div id="chatHeader" class="chat-header">
                <h2 id="currentRoomName">Выберите комнату</h2>
                <button id="roomInfoBtn" class="btn-icon" title="Участники">👥</button>
            </div>
            
            <div id="messagesContainer" class="messages-container">
                <div class="welcome-message">
                    <p>✨ Добро пожаловать в Messenger ✨</p>
                    <p>Выберите комнату или создайте новую, чтобы начать общение</p>
                </div>
            </div>
            
            <div class="message-input-container">
                <textarea id="messageInput" placeholder="Введите сообщение..." rows="3" disabled></textarea>
                <button id="sendMessageBtn" class="btn-send" disabled>Отправить</button>
            </div>
        </div>

        <!-- Модальное окно для создания комнаты -->
        <div id="createRoomModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Создать новую комнату</h3>
                    <span class="close">&times;</span>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label for="roomName">Название комнаты</label>
                        <input type="text" id="roomName" placeholder="Введите название комнаты">
                    </div>
                    <div class="form-group">
                        <label>Добавить участников</label>
                        <input type="text" id="userSearch" placeholder="Поиск пользователей...">
                        <div id="searchResults" class="search-results"></div>
                        <div id="selectedUsers" class="selected-users"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button id="confirmCreateRoom" class="btn-primary">Создать</button>
                    <button id="cancelCreateRoom" class="btn-secondary">Отмена</button>
                </div>
            </div>
        </div>

        <!-- Модальное окно с участниками -->
        <div id="membersModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Участники комнаты</h3>
                    <span class="close">&times;</span>
                </div>
                <div class="modal-body">
                    <div id="membersList" class="members-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/websocket.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
