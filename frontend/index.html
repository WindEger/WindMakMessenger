<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Messenger</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0d0f12;
  --bg2:       #131619;
  --bg3:       #191d22;
  --border:    #252a31;
  --border2:   #2e3540;
  --text:      #d8dde6;
  --text2:     #7a8898;
  --text3:     #4a5568;
  --accent:    #4e9eff;
  --accent2:   #0d6efd;
  --green:     #3ecf8e;
  --red:       #f56565;
  --msg-me:    #1a2a3e;
  --msg-other: #17191e;
  --radius:    6px;
  --font-mono: 'IBM Plex Mono', monospace;
  --font-sans: 'IBM Plex Sans', sans-serif;
  --sidebar-w: 300px;
  --topbar-h:  54px;
}

html, body { height: 100%; overflow: hidden; }
body { font-family: var(--font-sans); background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; }

/* ── Auth ─────────────────────────────────────────────── */
#auth-screen {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
}
.auth-card {
  width: 360px; background: var(--bg2);
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 40px;
}
.auth-logo {
  font-family: var(--font-mono); font-size: 13px; font-weight: 600;
  letter-spacing: .12em; color: var(--accent);
  margin-bottom: 32px; display: flex; align-items: center; gap: 8px;
}
.auth-logo::before {
  content: ''; width: 8px; height: 8px; background: var(--accent);
  border-radius: 50%; display: inline-block; box-shadow: 0 0 8px var(--accent);
}
.auth-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 28px; }
.auth-tab {
  flex: 1; padding: 10px 0; background: none; border: none;
  font-family: var(--font-mono); font-size: 12px; font-weight: 500;
  letter-spacing: .08em; color: var(--text3); cursor: pointer;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: color .2s, border-color .2s;
}
.auth-tab.active { color: var(--text); border-bottom-color: var(--accent); }
.auth-form { display: flex; flex-direction: column; gap: 14px; }
.auth-form.hidden { display: none; }
.field-label {
  font-family: var(--font-mono); font-size: 10px; font-weight: 600;
  letter-spacing: .14em; text-transform: uppercase; color: var(--text3); margin-bottom: 6px;
}
.field-group { display: flex; flex-direction: column; }
input[type=text], input[type=password] {
  background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius);
  padding: 10px 12px; color: var(--text); font-family: var(--font-sans);
  font-size: 14px; outline: none; transition: border-color .2s, box-shadow .2s;
}
input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(78,158,255,.12); }
input::placeholder { color: var(--text3); }
.btn-primary {
  margin-top: 6px; background: var(--accent); border: none; border-radius: var(--radius);
  padding: 11px; color: #fff; font-family: var(--font-mono); font-size: 12px; font-weight: 600;
  letter-spacing: .1em; cursor: pointer; transition: background .15s, transform .1s;
}
.btn-primary:hover { background: var(--accent2); }
.btn-primary:active { transform: scale(.98); }
.auth-error {
  font-family: var(--font-mono); font-size: 11px; color: var(--red);
  padding: 8px 10px; background: rgba(245,101,101,.08);
  border: 1px solid rgba(245,101,101,.2); border-radius: var(--radius); display: none;
}
.auth-error.show { display: block; }

/* ── App Layout ───────────────────────────────────────── */
#app { width: 100%; height: 100%; display: none; flex-direction: row; }
#app.visible { display: flex; }

/* ── Sidebar ──────────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w); min-width: var(--sidebar-w);
  background: var(--bg2); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; height: 100%; overflow: hidden;
}
.sidebar-header {
  height: var(--topbar-h); padding: 0 16px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.sidebar-logo {
  font-family: var(--font-mono); font-size: 12px; font-weight: 600;
  letter-spacing: .12em; color: var(--accent); display: flex; align-items: center; gap: 7px;
}
.conn-dot {
  width: 7px; height: 7px; border-radius: 50%; background: var(--text3);
  transition: background .3s, box-shadow .3s; flex-shrink: 0;
}
.conn-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }
.conn-dot.error { background: var(--red); }
.icon-btn {
  width: 30px; height: 30px; background: none; border: 1px solid var(--border2);
  border-radius: var(--radius); color: var(--text2); cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 16px;
  transition: background .15s, color .15s;
}
.icon-btn:hover { background: var(--bg3); color: var(--text); }
.sidebar-me {
  padding: 12px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.me-avatar {
  width: 32px; height: 32px; border-radius: 50%; background: var(--accent2);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono); font-size: 11px; font-weight: 600;
  color: #fff; flex-shrink: 0;
}
.me-info { flex: 1; min-width: 0; }
.me-nick { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.me-login { font-family: var(--font-mono); font-size: 10px; color: var(--text3); }
.logout-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 15px; transition: color .15s; padding: 4px; }
.logout-btn:hover { color: var(--red); }
.rooms-label {
  padding: 12px 16px 6px; font-family: var(--font-mono); font-size: 10px; font-weight: 600;
  letter-spacing: .14em; text-transform: uppercase; color: var(--text3);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.rooms-list { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }
.rooms-list::-webkit-scrollbar { width: 4px; }
.rooms-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.room-item {
  padding: 10px 16px; cursor: pointer; display: flex; align-items: center; gap: 10px;
  border-left: 2px solid transparent; transition: background .12s, border-color .12s;
}
.room-item:hover { background: var(--bg3); }
.room-item.active { background: rgba(78,158,255,.07); border-left-color: var(--accent); }
.room-avatar {
  width: 36px; height: 36px; border-radius: 50%; background: var(--bg3);
  border: 1px solid var(--border2); display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono); font-size: 13px; font-weight: 600;
  color: var(--text2); flex-shrink: 0; text-transform: uppercase;
}
.room-info { flex: 1; min-width: 0; }
.room-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.room-last { font-size: 11px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
.unread-badge {
  min-width: 18px; height: 18px; background: var(--accent); border-radius: 9px;
  font-family: var(--font-mono); font-size: 10px; font-weight: 600; color: #fff;
  display: flex; align-items: center; justify-content: center; padding: 0 5px; flex-shrink: 0;
}
.rooms-empty { padding: 32px 16px; text-align: center; color: var(--text3); font-size: 12px; font-family: var(--font-mono); }

/* ── Chat Area ────────────────────────────────────────── */
.chat-area { flex: 1; display: flex; flex-direction: column; height: 100%; overflow: hidden; }
.chat-topbar {
  height: var(--topbar-h); padding: 0 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px; flex-shrink: 0; background: var(--bg2);
}
.chat-title-wrap { flex: 1; min-width: 0; }
.chat-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.topbar-actions { display: flex; gap: 6px; flex-shrink: 0; }
.chat-placeholder {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; color: var(--text3); gap: 12px;
}
.chat-placeholder svg { opacity: .12; }
.chat-placeholder p { font-family: var(--font-mono); font-size: 12px; letter-spacing: .1em; }
.chat-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* Messages */
.messages-area {
  flex: 1; overflow-y: auto; padding: 16px 20px;
  display: flex; flex-direction: column; gap: 0;
  scrollbar-width: thin; scrollbar-color: var(--border2) transparent;
}
.messages-area::-webkit-scrollbar { width: 4px; }
.messages-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.load-more-wrap { text-align: center; padding: 8px 0 4px; }
.load-more-btn {
  background: none; border: 1px solid var(--border2); border-radius: var(--radius);
  color: var(--text3); font-family: var(--font-mono); font-size: 11px;
  padding: 6px 14px; cursor: pointer; transition: background .15s, color .15s;
}
.load-more-btn:hover { background: var(--bg3); color: var(--text2); }
.msg-group { display: flex; flex-direction: column; margin-bottom: 10px; }
.msg-group.me { align-items: flex-end; }
.msg-author {
  font-family: var(--font-mono); font-size: 10px; font-weight: 600;
  letter-spacing: .06em; color: var(--text3); padding: 0 10px; margin-bottom: 3px;
}
.msg-bubble {
  max-width: 68%; padding: 9px 13px; border-radius: 10px;
  font-size: 14px; line-height: 1.55; word-break: break-word;
  background: var(--msg-other); color: var(--text); border: 1px solid var(--border);
  animation: msgIn .15s ease;
}
.msg-group.me .msg-bubble { background: var(--msg-me); border-color: rgba(78,158,255,.2); }
@keyframes msgIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
.msg-time { font-family: var(--font-mono); font-size: 9px; color: var(--text3); padding: 2px 10px 0; }

/* Input */
.chat-input-bar {
  padding: 14px 20px; border-top: 1px solid var(--border);
  background: var(--bg2); display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0;
}
.input-wrap {
  flex: 1; background: var(--bg3); border: 1px solid var(--border2);
  border-radius: 10px; display: flex; align-items: flex-end; padding: 0 4px;
  transition: border-color .2s, box-shadow .2s;
}
.input-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(78,158,255,.1); }
#msg-input {
  flex: 1; background: none; border: none; outline: none; color: var(--text);
  font-family: var(--font-sans); font-size: 14px; padding: 10px 8px;
  resize: none; max-height: 130px; line-height: 1.5; scrollbar-width: thin;
}
#msg-input::placeholder { color: var(--text3); }
.send-btn {
  width: 36px; height: 36px; min-width: 36px; background: var(--accent);
  border: none; border-radius: 8px; color: #fff; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s, transform .1s; margin-bottom: 5px; flex-shrink: 0;
}
.send-btn:hover { background: var(--accent2); }
.send-btn:active { transform: scale(.93); }

/* ── Modal ────────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.6);
  backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center;
  z-index: 100;
}
.modal-overlay.hidden { display: none; }
.modal-box {
  background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius);
  padding: 28px; width: 340px; display: flex; flex-direction: column; gap: 16px;
  animation: slideUp .18s ease;
}
@keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: none; opacity: 1; } }
.modal-title {
  font-family: var(--font-mono); font-size: 12px; font-weight: 600;
  letter-spacing: .1em; text-transform: uppercase; color: var(--text);
}
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.btn-ghost {
  background: none; border: 1px solid var(--border2); border-radius: var(--radius);
  color: var(--text2); font-family: var(--font-mono); font-size: 11px;
  padding: 8px 14px; cursor: pointer; transition: background .15s;
}
.btn-ghost:hover { background: var(--bg3); }
.btn-sm { margin: 0; padding: 8px 16px; font-size: 11px; }
.members-list { display: flex; flex-direction: column; gap: 0; max-height: 260px; overflow-y: auto; }
.member-row {
  display: flex; align-items: center; gap: 10px; padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.member-row:last-child { border: none; }
.member-avatar {
  width: 28px; height: 28px; border-radius: 50%; background: var(--bg3);
  border: 1px solid var(--border2); display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono); font-size: 10px; font-weight: 600;
  color: var(--text2); text-transform: uppercase; flex-shrink: 0;
}
.member-name { font-size: 13px; }
.member-login { font-family: var(--font-mono); font-size: 10px; color: var(--text3); }

/* ── Toast ────────────────────────────────────────────── */
#toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius);
  padding: 10px 18px; font-family: var(--font-mono); font-size: 12px; color: var(--text2);
  opacity: 0; pointer-events: none; z-index: 200;
  transition: opacity .2s, transform .2s; white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.error { color: var(--red); border-color: rgba(245,101,101,.3); }
</style>
</head>
<body>

<!-- Auth -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">MSNGR</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Войти</button>
      <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Регистрация</button>
    </div>
    <form class="auth-form" id="form-login" onsubmit="doLogin(event)">
      <div class="field-group">
        <div class="field-label">Логин</div>
        <input type="text" id="l-login" placeholder="username" autocomplete="username" />
      </div>
      <div class="field-group">
        <div class="field-label">Пароль</div>
        <input type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <div class="auth-error" id="login-err"></div>
      <button class="btn-primary" type="submit">ВОЙТИ</button>
    </form>
    <form class="auth-form hidden" id="form-register" onsubmit="doRegister(event)">
      <div class="field-group">
        <div class="field-label">Логин</div>
        <input type="text" id="r-login" placeholder="username" autocomplete="username" />
      </div>
      <div class="field-group">
        <div class="field-label">Никнейм</div>
        <input type="text" id="r-nick" placeholder="Отображаемое имя" />
      </div>
      <div class="field-group">
        <div class="field-label">Пароль</div>
        <input type="password" id="r-pass" placeholder="минимум 6 символов" autocomplete="new-password" />
      </div>
      <div class="field-group">
        <div class="field-label">Повторите пароль</div>
        <input type="password" id="r-pass2" placeholder="••••••••" />
      </div>
      <div class="auth-error" id="reg-err"></div>
      <button class="btn-primary" type="submit">СОЗДАТЬ АККАУНТ</button>
    </form>
  </div>
</div>

<!-- App -->
<div id="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <span class="conn-dot" id="conn-dot"></span>
        MSNGR
      </div>
      <button class="icon-btn" title="Новый чат" onclick="openCreateRoom()">＋</button>
    </div>
    <div class="sidebar-me">
      <div class="me-avatar" id="me-avatar">?</div>
      <div class="me-info">
        <div class="me-nick" id="me-nick">—</div>
        <div class="me-login" id="me-login"></div>
      </div>
      <button class="logout-btn" onclick="doLogout()" title="Выйти">⏻</button>
    </div>
    <div class="rooms-label">Чаты</div>
    <div class="rooms-list" id="rooms-list">
      <div class="rooms-empty">нет чатов</div>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-area">
    <!-- Placeholder -->
    <div class="chat-placeholder" id="chat-placeholder">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <p>выберите чат</p>
    </div>

    <!-- Active chat (hidden until room selected) -->
    <div class="chat-main" id="chat-main" style="display:none">
      <div class="chat-topbar">
        <div class="chat-title-wrap">
          <div class="chat-title" id="chat-title">—</div>
        </div>
        <div class="topbar-actions">
          <button class="icon-btn" title="Участники" id="btn-members">👥</button>
          <button class="icon-btn" title="Добавить участника" id="btn-add-member">＋</button>
          <button class="icon-btn" title="Переименовать" id="btn-rename">✎</button>
          <button class="icon-btn" title="Покинуть чат" id="btn-leave" style="color:var(--red)">✕</button>
        </div>
      </div>
      <div class="messages-area" id="messages-area">
        <div class="load-more-wrap" id="load-more-wrap">
          <button class="load-more-btn" id="load-more-btn">Загрузить ещё</button>
        </div>
      </div>
      <div class="chat-input-bar">
        <div class="input-wrap">
          <textarea id="msg-input" rows="1" placeholder="Сообщение... (Enter — отправить, Shift+Enter — новая строка)"></textarea>
        </div>
        <button class="send-btn" id="send-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Modal: create room -->
<div class="modal-overlay hidden" id="modal-create-room">
  <div class="modal-box">
    <div class="modal-title">Новый чат</div>
    <div class="field-group">
      <div class="field-label">Название</div>
      <input type="text" id="new-room-name" placeholder="Название чата" maxlength="80" />
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal('modal-create-room')">Отмена</button>
      <button class="btn-primary btn-sm" onclick="doCreateRoom()">Создать</button>
    </div>
  </div>
</div>

<!-- Modal: add member -->
<div class="modal-overlay hidden" id="modal-add-member">
  <div class="modal-box">
    <div class="modal-title">Добавить участника</div>
    <div class="field-group">
      <div class="field-label">Логин пользователя</div>
      <input type="text" id="add-member-login" placeholder="username" />
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal('modal-add-member')">Отмена</button>
      <button class="btn-primary btn-sm" onclick="doAddMember()">Добавить</button>
    </div>
  </div>
</div>

<!-- Modal: rename -->
<div class="modal-overlay hidden" id="modal-rename">
  <div class="modal-box">
    <div class="modal-title">Переименовать чат</div>
    <div class="field-group">
      <div class="field-label">Новое название</div>
      <input type="text" id="rename-input" placeholder="Название" maxlength="80" />
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal('modal-rename')">Отмена</button>
      <button class="btn-primary btn-sm" onclick="doRenameRoom()">Сохранить</button>
    </div>
  </div>
</div>

<!-- Modal: members -->
<div class="modal-overlay hidden" id="modal-members">
  <div class="modal-box">
    <div class="modal-title">Участники</div>
    <div class="members-list" id="members-list">
      <div style="color:var(--text3);font-size:12px;font-family:var(--font-mono)">Загрузка...</div>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal('modal-members')">Закрыть</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════ */
let token = localStorage.getItem('token') || '';
let me    = JSON.parse(localStorage.getItem('me') || 'null');
let ws    = null;
let wsReady = false;

let rooms        = [];   // RoomWithMeta[]
let activeRoomID = null;
let msgCache     = {};   // roomID → Message[]
let msgOffset    = {};   // roomID → int (сколько загружено, считаем сами)
let noMoreMsgs   = {};   // roomID → bool

/* ═══════════════════════════════════════════════════════
   AUTH
═══════════════════════════════════════════════════════ */
function switchTab(tab) {
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  document.getElementById('form-login').classList.toggle('hidden', tab !== 'login');
  document.getElementById('form-register').classList.toggle('hidden', tab !== 'register');
}

async function apiPost(url, body) {
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  return res.json();
}

async function doLogin(e) {
  e.preventDefault();
  const errEl = document.getElementById('login-err');
  errEl.classList.remove('show');
  try {
    const data = await apiPost('/login', {
      login:    document.getElementById('l-login').value.trim(),
      password: document.getElementById('l-pass').value
    });
    if (!data.success) throw new Error(data.error || 'Ошибка входа');
    token = data.data.token;
    me    = { login: data.data.login, nickname: data.data.nickname };
    localStorage.setItem('token', token);
    localStorage.setItem('me', JSON.stringify(me));
    startApp();
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.add('show');
  }
}

async function doRegister(e) {
  e.preventDefault();
  const errEl = document.getElementById('reg-err');
  errEl.classList.remove('show');
  try {
    const data = await apiPost('/register', {
      login:          document.getElementById('r-login').value.trim(),
      nickname:       document.getElementById('r-nick').value.trim(),
      password:       document.getElementById('r-pass').value,
      repeatPassword: document.getElementById('r-pass2').value
    });
    if (!data.success) throw new Error(data.error || 'Ошибка регистрации');
    toast('Аккаунт создан — войдите');
    switchTab('login');
    document.getElementById('l-login').value = document.getElementById('r-login').value;
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.add('show');
  }
}

function doLogout() {
  localStorage.removeItem('token');
  localStorage.removeItem('me');
  token = ''; me = null;
  if (ws) { ws.onclose = null; ws.close(); ws = null; }
  wsReady = false; rooms = []; msgCache = {}; activeRoomID = null;
  document.getElementById('app').classList.remove('visible');
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('chat-main').style.display = 'none';
  document.getElementById('chat-placeholder').style.display = 'flex';
}

/* ═══════════════════════════════════════════════════════
   APP START
═══════════════════════════════════════════════════════ */
function startApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  const nick = me.nickname || me.login;
  document.getElementById('me-nick').textContent = nick;
  document.getElementById('me-login').textContent = '@' + me.login;
  document.getElementById('me-avatar').textContent = nick[0].toUpperCase();
  connectWS();
  setupInputs();
  setupTopbarButtons();
}

/* ═══════════════════════════════════════════════════════
   WEBSOCKET
═══════════════════════════════════════════════════════ */
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws?token=${encodeURIComponent(token)}`);
  setDot('connecting');

  ws.onopen  = () => { wsReady = true;  setDot('connected'); };
  ws.onerror = () => { setDot('error'); };
  ws.onclose = () => {
    wsReady = false;
    setDot('disconnected');
    setTimeout(() => { if (token) connectWS(); }, 3000);
  };
  ws.onmessage = (e) => {
    try { handleMsg(JSON.parse(e.data)); } catch(err) { console.error('[WS] parse error', err); }
  };
}

function wsSend(action, payload) {
  if (ws && wsReady) {
    ws.send(JSON.stringify({ action, payload: payload || {} }));
  } else {
    toast('Нет соединения', true);
  }
}

function setDot(state) {
  const d = document.getElementById('conn-dot');
  d.className = 'conn-dot';
  if (state === 'connected') d.classList.add('connected');
  if (state === 'error')     d.classList.add('error');
}

/* ═══════════════════════════════════════════════════════
   SERVER MESSAGES
═══════════════════════════════════════════════════════ */
function handleMsg(msg) {
  // Глобальный перехватчик (для модалок)
  if (globalInterceptor && globalInterceptor(msg)) return;

  if (!msg.success && msg.error) {
    toast('⚠ ' + msg.error, true);
    return;
  }

  switch (msg.action) {
    case 'init':
      applyRooms(msg.data.rooms || []);
      break;

    case 'rooms':
      applyRooms(msg.data || []);
      break;

    case 'room_created': {
      // Сервер возвращает { new_room_id, rooms }
      applyRooms(msg.data.rooms || []);
      const rid = msg.data.new_room_id;
      if (rid) openRoom(rid);
      break;
    }

    case 'messages':
      onMessages(msg.data);
      break;

    case 'new_message':
      onNewMessage(msg.data);
      break;

    case 'left_room': {
      const rid = msg.data.room_id;
      rooms = rooms.filter(r => r.id !== rid);
      delete msgCache[rid];
      if (activeRoomID === rid) {
        activeRoomID = null;
        showPlaceholder();
      }
      renderRoomsList();
      toast('Вы покинули чат');
      break;
    }

    case 'added_to_room':
      // Нас добавили в новый чат
      wsSend('get_rooms');
      toast('Вас добавили в чат: ' + (msg.data.roomName || msg.data.RoomName));
      break;

    case 'member_joined':
    case 'member_left':
      // Можно показать системное сообщение — пока просто игнор
      break;

    case 'room_renamed': {
      const r = rooms.find(x => x.id === msg.data.room_id);
      if (r) {
        r.roomName = msg.data.room_name;
        renderRoomsList();
        if (activeRoomID === msg.data.room_id)
          document.getElementById('chat-title').textContent = msg.data.room_name;
      }
      break;
    }

    case 'messages_read': {
      const r = rooms.find(x => x.id === msg.data.room_id);
      if (r) { r.unread_count = 0; renderRoomsList(); }
      break;
    }

    case 'members':
      renderMembersList(msg.data.members || []);
      break;

    case 'member_added':
      toast('Участник добавлен');
      break;

    case 'mark_read_ok':
    case 'pong':
      break;

    default:
      console.log('[WS]', msg.action, msg);
  }
}

// Временный перехватчик для модалок (возвращает true чтобы остановить обработку)
let globalInterceptor = null;

/* ═══════════════════════════════════════════════════════
   ROOMS
═══════════════════════════════════════════════════════ */
function applyRooms(data) {
  rooms = data;
  renderRoomsList();
}

function renderRoomsList() {
  const el = document.getElementById('rooms-list');
  if (!rooms.length) {
    el.innerHTML = '<div class="rooms-empty">нет чатов<br><span style="font-size:10px;margin-top:6px;display:block">нажмите ＋ чтобы создать</span></div>';
    return;
  }
  el.innerHTML = rooms.map(r => {
    const letter = (r.roomName || r.RoomName || '?')[0].toUpperCase();
    const name   = escHtml(r.roomName || r.RoomName || '');
    const lm     = r.last_message;
    const lastText = lm
      ? escHtml((lm.nickname || lm.UserNickname || '') + ': ' + (lm.content || lm.Content || '')).slice(0, 45)
      : '';
    const badge = r.unread_count > 0
      ? `<span class="unread-badge">${r.unread_count > 99 ? '99+' : r.unread_count}</span>` : '';
    const active = r.id === activeRoomID ? ' active' : '';
    return `<div class="room-item${active}" data-id="${r.id}" onclick="openRoom(${r.id})">
      <div class="room-avatar">${letter}</div>
      <div class="room-info">
        <div class="room-name">${name}</div>
        <div class="room-last">${lastText || '—'}</div>
      </div>
      ${badge}
    </div>`;
  }).join('');
}

/* ═══════════════════════════════════════════════════════
   OPEN ROOM
═══════════════════════════════════════════════════════ */
function openRoom(roomID) {
  activeRoomID = roomID;
  renderRoomsList();

  const room = rooms.find(r => r.id === roomID);
  document.getElementById('chat-title').textContent = room ? (room.roomName || room.RoomName) : '—';

  document.getElementById('chat-placeholder').style.display = 'none';
  document.getElementById('chat-main').style.display = 'flex';

  // Сбросить кэш и загрузить сообщения
  msgCache[roomID]  = [];
  msgOffset[roomID] = 0;
  noMoreMsgs[roomID] = false;

  const area = document.getElementById('messages-area');
  area.innerHTML = '<div class="load-more-wrap" id="load-more-wrap"><button class="load-more-btn" id="load-more-btn" onclick="loadMore()">Загрузить ещё</button></div>';
  document.getElementById('load-more-wrap').style.display = 'none';

  wsSend('get_messages', { room_id: roomID, limit: 50, offset: 0 });

  // Сбросить счётчик непрочитанных
  const r = rooms.find(x => x.id === roomID);
  if (r) { r.unread_count = 0; renderRoomsList(); }
}

function showPlaceholder() {
  document.getElementById('chat-placeholder').style.display = 'flex';
  document.getElementById('chat-main').style.display = 'none';
}

/* ═══════════════════════════════════════════════════════
   MESSAGES
═══════════════════════════════════════════════════════ */
function onMessages(data) {
  const roomID  = data.room_id;
  const msgs    = data.messages || [];
  const offset  = data.offset || 0;
  const isFirst = offset === 0;

  if (roomID !== activeRoomID) return;

  // Сервер шлёт DESC (новые первые) → разворачиваем в ASC
  const ordered = [...msgs].reverse();

  if (isFirst) {
    msgCache[roomID]  = ordered;
    msgOffset[roomID] = ordered.length;
  } else {
    msgCache[roomID]  = [...ordered, ...msgCache[roomID]];
    msgOffset[roomID] += ordered.length;
  }

  const hasMore = msgs.length >= data.limit;
  noMoreMsgs[roomID] = !hasMore;

  if (isFirst) {
    renderAllMessages(roomID);
    scrollBottom();
  } else {
    prependMessages(roomID, ordered);
  }
}

function renderAllMessages(roomID) {
  const area = document.getElementById('messages-area');
  const lmw  = document.getElementById('load-more-wrap');

  // Удаляем все пузыри, кнопку оставляем
  Array.from(area.children).forEach(el => {
    if (!el.classList.contains('load-more-wrap')) el.remove();
  });

  lmw.style.display = noMoreMsgs[roomID] ? 'none' : 'block';

  const msgs = msgCache[roomID] || [];
  msgs.forEach(m => area.appendChild(buildBubble(m)));
}

function prependMessages(roomID, newMsgs) {
  const area = document.getElementById('messages-area');
  const lmw  = document.getElementById('load-more-wrap');
  const prevHeight = area.scrollHeight;

  newMsgs.forEach(m => {
    lmw.insertAdjacentElement('afterend', buildBubble(m));
  });

  lmw.style.display = noMoreMsgs[roomID] ? 'none' : 'block';

  // Сохраняем позицию скролла
  area.scrollTop = area.scrollHeight - prevHeight;
}

function onNewMessage(msg) {
  // Ключи из map[string]interface{} в Go → snake_case
  const roomID   = msg.room_id;
  const nickname = msg.nickname || '';

  if (!msgCache[roomID]) msgCache[roomID] = [];
  msgCache[roomID].push(msg);
  if (msgOffset[roomID] !== undefined) msgOffset[roomID]++;

  // Обновить список чатов
  const r = rooms.find(x => x.id === roomID);
  if (r) {
    r.last_message = msg;
    if (roomID !== activeRoomID) r.unread_count = (r.unread_count || 0) + 1;
    rooms = [r, ...rooms.filter(x => x.id !== roomID)];
    renderRoomsList();
  }

  if (roomID === activeRoomID) {
    const area = document.getElementById('messages-area');
    area.appendChild(buildBubble(msg));
    scrollBottom();
    wsSend('mark_read', { room_id: roomID });
  }
}

function buildBubble(msg) {
  // Поддержка обоих форматов: struct (UserID) и map (user_id)
  const myID   = getMyID();
  const userID = msg.user_id  !== undefined ? msg.user_id  : msg.UserID;
  const isMe   = userID === myID;
  const nick   = msg.nickname || msg.UserNickname || '?';
  const text   = msg.content  || msg.Content  || '';
  const time   = formatTime(msg.created_at || msg.CreatedDateTime);

  const div = document.createElement('div');
  div.className = 'msg-group' + (isMe ? ' me' : '');
  div.innerHTML = `
    ${!isMe ? `<div class="msg-author">${escHtml(nick)}</div>` : ''}
    <div class="msg-bubble">${escHtml(text)}</div>
    <div class="msg-time">${time}</div>
  `;
  return div;
}

function loadMore() {
  if (!activeRoomID || noMoreMsgs[activeRoomID]) return;
  wsSend('get_messages', {
    room_id: activeRoomID,
    limit:   50,
    offset:  msgOffset[activeRoomID] || 0
  });
}

function scrollBottom() {
  const area = document.getElementById('messages-area');
  area.scrollTop = area.scrollHeight;
}

/* ═══════════════════════════════════════════════════════
   SEND MESSAGE
═══════════════════════════════════════════════════════ */
function sendMessage() {
  if (!activeRoomID) return;
  const input = document.getElementById('msg-input');
  const text  = input.value.trim();
  if (!text) return;
  wsSend('send_message', { room_id: activeRoomID, content: text });
  input.value = '';
  input.style.height = 'auto';
}

function setupInputs() {
  const input = document.getElementById('msg-input');
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 130) + 'px';
  });
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  document.getElementById('send-btn').addEventListener('click', sendMessage);
}

/* ═══════════════════════════════════════════════════════
   TOPBAR BUTTONS
═══════════════════════════════════════════════════════ */
function setupTopbarButtons() {
  document.getElementById('btn-members').addEventListener('click', openMembers);
  document.getElementById('btn-add-member').addEventListener('click', openAddMember);
  document.getElementById('btn-rename').addEventListener('click', openRename);
  document.getElementById('btn-leave').addEventListener('click', confirmLeave);
  document.getElementById('load-more-btn') && document.getElementById('load-more-btn').addEventListener('click', loadMore);
}

/* ═══════════════════════════════════════════════════════
   MODALS
═══════════════════════════════════════════════════════ */
function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

document.querySelectorAll('.modal-overlay').forEach(o =>
  o.addEventListener('click', e => { if (e.target === o) o.classList.add('hidden'); })
);
document.addEventListener('keydown', e => {
  if (e.key === 'Escape')
    document.querySelectorAll('.modal-overlay').forEach(o => o.classList.add('hidden'));
});

// Create room
function openCreateRoom() {
  document.getElementById('new-room-name').value = '';
  openModal('modal-create-room');
  setTimeout(() => document.getElementById('new-room-name').focus(), 50);
}
function doCreateRoom() {
  const name = document.getElementById('new-room-name').value.trim();
  if (!name) return;
  closeModal('modal-create-room');
  wsSend('create_room', { room_name: name });
}
document.getElementById('new-room-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') doCreateRoom();
});

// Add member
function openAddMember() {
  if (!activeRoomID) return;
  document.getElementById('add-member-login').value = '';
  openModal('modal-add-member');
  setTimeout(() => document.getElementById('add-member-login').focus(), 50);
}
function doAddMember() {
  const login = document.getElementById('add-member-login').value.trim();
  if (!login || !activeRoomID) return;
  closeModal('modal-add-member');
  wsSend('add_member', { room_id: activeRoomID, login });
}
document.getElementById('add-member-login').addEventListener('keydown', e => {
  if (e.key === 'Enter') doAddMember();
});

// Rename
function openRename() {
  if (!activeRoomID) return;
  const r = rooms.find(x => x.id === activeRoomID);
  document.getElementById('rename-input').value = r ? (r.roomName || r.RoomName || '') : '';
  openModal('modal-rename');
  setTimeout(() => document.getElementById('rename-input').focus(), 50);
}
function doRenameRoom() {
  const name = document.getElementById('rename-input').value.trim();
  if (!name || !activeRoomID) return;
  closeModal('modal-rename');
  wsSend('rename_room', { room_id: activeRoomID, room_name: name });
}
document.getElementById('rename-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doRenameRoom();
});

// Members modal
function openMembers() {
  if (!activeRoomID) return;
  document.getElementById('members-list').innerHTML =
    '<div style="color:var(--text3);font-size:12px;font-family:var(--font-mono)">Загрузка...</div>';
  openModal('modal-members');

  // Один раз перехватить ответ members
  globalInterceptor = (msg) => {
    if (msg.action === 'members') {
      renderMembersList(msg.data.members || []);
      globalInterceptor = null;
      return true;
    }
    if (!msg.success && msg.error) {
      globalInterceptor = null;
      return false;
    }
    return false;
  };
  setTimeout(() => { globalInterceptor = null; }, 5000);

  wsSend('get_members', { room_id: activeRoomID });
}

function renderMembersList(members) {
  const el = document.getElementById('members-list');
  if (!members.length) {
    el.innerHTML = '<div style="color:var(--text3);font-size:12px">Нет участников</div>';
    return;
  }
  el.innerHTML = members.map(u => {
    const nick  = u.Nickname || u.nickname || u.Login || u.login || '?';
    const login = u.Login    || u.login    || '';
    return `<div class="member-row">
      <div class="member-avatar">${escHtml(nick[0].toUpperCase())}</div>
      <div>
        <div class="member-name">${escHtml(nick)}</div>
        <div class="member-login">@${escHtml(login)}</div>
      </div>
    </div>`;
  }).join('');
}

// Leave
function confirmLeave() {
  if (!activeRoomID) return;
  const r = rooms.find(x => x.id === activeRoomID);
  const name = r ? (r.roomName || r.RoomName) : 'этот чат';
  if (!confirm(`Покинуть "${name}"?`)) return;
  wsSend('leave_room', { room_id: activeRoomID });
}

/* ═══════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════ */
let _myID = null;
function getMyID() {
  if (_myID !== null) return _myID;
  try {
    const payload = JSON.parse(atob(token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
    _myID = payload.user_id;
  } catch { _myID = -1; }
  return _myID;
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatTime(dt) {
  if (!dt) return '';
  const d = new Date(dt);
  if (isNaN(d.getTime())) return '';
  const now = new Date();
  const isToday = d.toDateString() === now.toDateString();
  if (isToday) return d.toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });
  return d.toLocaleDateString('ru', { day: '2-digit', month: '2-digit' })
       + ' ' + d.toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });
}

let toastTimer = null;
function toast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = isError ? 'error' : '';
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3200);
}

/* ═══════════════════════════════════════════════════════
   BOOTSTRAP
═══════════════════════════════════════════════════════ */
if (token && me) startApp();
</script>
